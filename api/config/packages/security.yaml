security:
    password_hashers:
        Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface: 'auto'

    providers:
        app_user_provider:
            entity:
                class: App\User\Domain\User
                property: email

    firewalls:
        dev:
            pattern: ^/(_profiler|_wdt|assets|build)/
            security: false

        login:
            pattern: ^/api/login_check$
            stateless: true
            provider: app_user_provider
            json_login:
                check_path: /api/login_check
                username_path: email
                password_path: password
                success_handler: lexik_jwt_authentication.handler.authentication_success
                failure_handler: lexik_jwt_authentication.handler.authentication_failure

        api:
            pattern: ^/api
            stateless: true
            provider: app_user_provider
            jwt: ~

        main:
            lazy: true
            provider: app_user_provider

    access_control:
        - { path: ^/api/register$, roles: PUBLIC_ACCESS }
        - { path: ^/api/login_check$, roles: PUBLIC_ACCESS }
        - { path: ^/api/services$, roles: PUBLIC_ACCESS, methods: [GET] }
        - { path: ^/api/availability$, roles: PUBLIC_ACCESS, methods: [GET] }
        - { path: ^/api/bookings$, roles: PUBLIC_ACCESS, methods: [GET] }
        - { path: ^/api/me$, roles: IS_AUTHENTICATED_FULLY }
        - { path: ^/api/services$, roles: ROLE_PROVIDER, methods: [POST] }
        - { path: ^/api/bookings$, roles: ROLE_CLIENT, methods: [POST] }
        - { path: ^/api, roles: IS_AUTHENTICATED_FULLY }

when@test:
    security:
        password_hashers:
            Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface:
                algorithm: auto
                cost: 4
                time_cost: 3
                memory_cost: 10