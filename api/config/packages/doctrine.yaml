doctrine:
    dbal:
        url: '%env(resolve:DATABASE_URL)%'

    orm:
        auto_mapping: false
        naming_strategy: doctrine.orm.naming_strategy.underscore_number_aware
        validate_xml_mapping: true
        mappings:
            Service:
                is_bundle: false
                type: attribute
                dir: '%kernel.project_dir%/src/Service/Domain'
                prefix: 'App\Service\Domain'
                alias: Service
            Booking:
                is_bundle: false
                type: attribute
                dir: '%kernel.project_dir%/src/Booking/Domain'
                prefix: 'App\Booking\Domain'
                alias: Booking
            User:
                is_bundle: false
                type: attribute
                dir: '%kernel.project_dir%/src/User/Domain'
                prefix: 'App\User\Domain'
                alias: User

when@test:
    doctrine:
        dbal:
            dbname_suffix: '_test%env(default::TEST_TOKEN)%'

when@prod:
    doctrine:
        orm:
            query_cache_driver:
                type: pool
                pool: doctrine.system_cache_pool
            result_cache_driver:
                type: pool
                pool: doctrine.result_cache_pool

    framework:
        cache:
            pools:
                doctrine.result_cache_pool:
                    adapter: cache.app
                doctrine.system_cache_pool:
                    adapter: cache.system